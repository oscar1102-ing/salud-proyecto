<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link rel="icon" type="image/png" sizes="32x32" href="img/icono.png">
    <link rel="stylesheet" href="styles.css">
</head>


<body>

<div class="app"> 

<header class="header">
    <a href="index.html" class="logo-container">
        <img src="img/logo.png" alt="Logo">
        <span>Planificador</span>
    </a>
</header>

<main class="center">

<section class="form-card large">

<h2>Crear cuenta</h2>

<form id="formRegistro">

    <h4>Información personal</h4>
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="email" id="email" placeholder="Correo electrónico" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <input type="number" id="edad" placeholder="Edad">

    <h4>Contexto del usuario</h4>
    <select id="tipoUsuario" class="select-moderno">
        <option value="">Tipo de usuario</option>
        <option value="Estudiante">Estudiante</option>
        <option value="Trabajador">Trabajador</option>
    </select>

    <select id="nivelCarga" class="select-moderno">
        <option value="">Nivel de carga actual</option>
        <option value="Bajo">Bajo</option>
        <option value="Medio">Medio</option>
        <option value="Alto">Alto</option>
    </select>

    <input type="number" id="horasTrabajo" placeholder="Horas de trabajo diario">
    <input type="number" id="horasDescanso" placeholder="Horas de descanso diario">

    <button type="submit" class="btn-principal">Registrarse</button>

    
</form>

<input type="checkbox" id="btn-modal" hidden>

<div class="container-modal">
    <div class="content-modal">
        <h2 id="modalTitulo">Título</h2>
        <p id="modalMensaje">Mensaje aquí</p>

        <div class="btn-cerrar">
            <label for="btn-modal">Cerrar</label>
        </div>
    </div>

    <label for="btn-modal" class="cerrar-modal"></label>
</div>


<p>
    ¿Ya tienes cuenta?
    <a href="login.html">Iniciar sesión</a>
</p>

</section>

</main>

<footer class="footer"></footer>

</div> <!-- Cierra .app -->

<script src="registro.js"></script>

</body>
</html>
